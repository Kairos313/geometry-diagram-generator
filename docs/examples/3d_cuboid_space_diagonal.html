<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geometry Diagram</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#ffffff;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif}
canvas{display:block}
#info{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(0,0,0,.5);font-size:13px;text-align:center;pointer-events:none;letter-spacing:.3px}
#legend{position:absolute;top:20px;left:20px;color:rgba(0,0,0,.75);font-size:13px;line-height:2}
.dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;vertical-align:middle}
.line-sw{display:inline-block;width:16px;height:3px;margin-right:6px;vertical-align:middle;border-radius:1px}
#controls{position:absolute;top:20px;right:20px;display:flex;gap:8px}
#controls button{background:rgba(0,0,0,.06);border:1px solid rgba(0,0,0,.15);color:#333;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;transition:background .2s}
#controls button:hover{background:rgba(0,0,0,.1)}
#controls button.active{background:rgba(100,140,255,.2);border-color:rgba(100,140,255,.5);color:#1a4eaa}
</style>
</head>
<body>
<div id="legend">
  <div><span class="dot" style="background:#5b4dc7"></span>Cuboid vertices</div>
  <div><span class="line-sw" style="background:#5b4dc7"></span>Solid edges</div>
  <div><span class="line-sw" style="background:#aaaaaa;border:1px dashed #888"></span>Hidden edges</div>
  <div><span class="line-sw" style="background:#d85a30"></span>Space diagonal AG (?)</div>
</div>
<div id="controls">
  <button id="btnRotate" onclick="toggleRotate()">Auto-rotate</button>
  <button onclick="resetCam()">Reset view</button>
</div>
<div id="info">Drag to orbit · Scroll to zoom</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0xffffff);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const dl = new THREE.DirectionalLight(0xffffff, 0.8);
dl.position.set(10, 20, 15);
scene.add(dl);

function addEdge(a, b, color, dashed) {
  const mat = dashed
    ? new THREE.LineDashedMaterial({color, dashSize:0.3, gapSize:0.15})
    : new THREE.LineBasicMaterial({color});
  const geo = new THREE.BufferGeometry().setFromPoints([a, b]);
  const line = new THREE.Line(geo, mat);
  if (dashed) line.computeLineDistances();
  scene.add(line);
  return line;
}

function addSphere(pos, color, r) {
  r = r || 0.18;
  const m = new THREE.Mesh(
    new THREE.SphereGeometry(r, 16, 16),
    new THREE.MeshPhongMaterial({color, emissive: color, emissiveIntensity: 0.35})
  );
  m.position.copy(pos);
  scene.add(m);
  return m;
}

function makeLabel(text, pos, color, size) {
  color = color || '#333333';
  size = size || 0.6;
  const c = document.createElement('canvas'); c.width = 256; c.height = 64;
  const ctx = c.getContext('2d');
  ctx.font = 'bold 36px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = color; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, 128, 32);
  const tex = new THREE.CanvasTexture(c);
  const mat = new THREE.SpriteMaterial({map: tex, transparent: true, depthTest: false});
  const sp = new THREE.Sprite(mat);
  sp.position.copy(pos);
  sp.scale.set(size * 4, size, 1);
  scene.add(sp);
  return sp;
}

function addFace(vertices, color, opacity) {
  opacity = opacity || 0.12;
  const positions = [];
  for (let i = 1; i < vertices.length - 1; i++) {
    positions.push(vertices[0].x, vertices[0].y, vertices[0].z);
    positions.push(vertices[i].x, vertices[i].y, vertices[i].z);
    positions.push(vertices[i+1].x, vertices[i+1].y, vertices[i+1].z);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(positions), 3));
  geo.computeVertexNormals();
  const mat = new THREE.MeshPhongMaterial({
    color, transparent: true, opacity, side: THREE.DoubleSide, depthWrite: false
  });
  scene.add(new THREE.Mesh(geo, mat));
}

// Camera setup
camera.position.set(16, 12, 18);
camera.lookAt(2, 2.5, 2.5);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.target.set(2, 2.5, 2.5);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.autoRotate = false;
controls.autoRotateSpeed = 2.0;
controls.minDistance = 5;
controls.maxDistance = 60;
controls.maxPolarAngle = Math.PI * 0.85;
controls.update();

const _initPos = camera.position.clone();
const _initTarget = controls.target.clone();

function toggleRotate() {
  controls.autoRotate = !controls.autoRotate;
  document.getElementById('btnRotate').classList.toggle('active', controls.autoRotate);
}
function resetCam() {
  camera.position.copy(_initPos);
  controls.target.copy(_initTarget);
  controls.autoRotate = false;
  document.getElementById('btnRotate').classList.remove('active');
  controls.update();
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', function() {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// === CUBOID GEOMETRY ===
// Scaled: AB=8 -> 4 units, BC=6 -> 3 units, CG=10 -> 5 units
// A=(0,0,0), B=(4,0,0), C=(4,3,0), D=(0,3,0)
// E=(0,0,5), F=(4,0,5), G=(4,3,5), H=(0,3,5)

const A = new THREE.Vector3(0, 0, 0);
const B = new THREE.Vector3(4, 0, 0);
const C = new THREE.Vector3(4, 3, 0);
const D = new THREE.Vector3(0, 3, 0);
const E = new THREE.Vector3(0, 0, 5);
const F = new THREE.Vector3(4, 0, 5);
const G = new THREE.Vector3(4, 3, 5);
const H = new THREE.Vector3(0, 3, 5);

// Faces (translucent)
addFace([A, B, C, D], 0x7b68ee, 0.13);
addFace([E, F, G, H], 0x4ae0b0, 0.13);
addFace([A, B, F, E], 0xff6b4a, 0.10);
addFace([B, C, G, F], 0xba7517, 0.10);
addFace([C, D, H, G], 0x7b68ee, 0.10);
addFace([D, A, E, H], 0x4ae0b0, 0.10);

// Solid edges
addEdge(A, B, 0x5b4dc7, false);
addEdge(B, C, 0x5b4dc7, false);
addEdge(E, F, 0x5b4dc7, false);
addEdge(F, G, 0x5b4dc7, false);
addEdge(G, H, 0x5b4dc7, false);
addEdge(H, E, 0x5b4dc7, false);
addEdge(A, E, 0x5b4dc7, false);
addEdge(B, F, 0x5b4dc7, false);
addEdge(C, G, 0x5b4dc7, false);

// Dashed edges (hidden)
addEdge(C, D, 0x888780, true);
addEdge(D, A, 0x888780, true);
addEdge(D, H, 0x888780, true);

// Space diagonal AG — highlighted, dashed
addEdge(A, G, 0xd85a30, true);

// Vertices
addSphere(A, 0x5b4dc7, 0.18);
addSphere(B, 0x5b4dc7, 0.18);
addSphere(C, 0x5b4dc7, 0.18);
addSphere(D, 0x5b4dc7, 0.18);
addSphere(E, 0x5b4dc7, 0.18);
addSphere(F, 0x5b4dc7, 0.18);
addSphere(G, 0x5b4dc7, 0.18);
addSphere(H, 0x5b4dc7, 0.18);

// Highlight A and G
addSphere(A, 0xd85a30, 0.25);
addSphere(G, 0xd85a30, 0.25);

// Vertex labels
makeLabel('A', new THREE.Vector3(-0.5, -0.5, 0), '#4a3aad', 0.55);
makeLabel('B', new THREE.Vector3(4.5, -0.5, 0), '#4a3aad', 0.55);
makeLabel('C', new THREE.Vector3(4.6, 3.4, 0), '#4a3aad', 0.55);
makeLabel('D', new THREE.Vector3(-0.6, 3.4, 0), '#4a3aad', 0.55);
makeLabel('E', new THREE.Vector3(-0.6, -0.5, 5.3), '#4a3aad', 0.55);
makeLabel('F', new THREE.Vector3(4.5, -0.5, 5.3), '#4a3aad', 0.55);
makeLabel('G', new THREE.Vector3(4.6, 3.5, 5.3), '#4a3aad', 0.55);
makeLabel('H', new THREE.Vector3(-0.6, 3.5, 5.3), '#4a3aad', 0.55);

// Edge measurement labels
// AB midpoint: (2, 0, 0), offset downward
const midAB = new THREE.Vector3(2, -0.7, 0);
makeLabel('8 cm', midAB, '#0f6e56', 0.48);

// BC midpoint: (4, 1.5, 0), offset right
const midBC = new THREE.Vector3(4.9, 1.5, 0);
makeLabel('6 cm', midBC, '#0f6e56', 0.48);

// CG midpoint: (4, 3, 2.5), offset right
const midCG = new THREE.Vector3(5.0, 3.0, 2.5);
makeLabel('10 cm', midCG, '#0f6e56', 0.48);

// AG label at midpoint, highlighted
const midAG = new THREE.Vector3(2.0, 1.5, 2.5);
// Offset the label slightly
const agLabelPos = new THREE.Vector3(2.0 - 0.8, 1.5 + 0.3, 2.5);
makeLabel('?', agLabelPos, '#d85a30', 0.7);

</script>
</body>
</html>
