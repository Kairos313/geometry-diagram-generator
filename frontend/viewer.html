<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Geometry Renderer Viewer</title>
<style>
  :root {
    --bg: #f8f7f4;
    --surface: #ffffff;
    --text: #2c2c2a;
    --text-secondary: #5f5e5a;
    --border: #e0dfdb;
    --accent: #5b4dc7;
    --accent-hover: #4a3db0;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1e;
      --surface: #2a2a2e;
      --text: #e8e6df;
      --text-secondary: #b4b2a9;
      --border: #3a3a3e;
      --accent: #b8a9ff;
      --accent-hover: #9b88ff;
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 20px;
    max-width: 1200px;
    margin: 0 auto;
  }

  h1 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 16px;
    color: var(--text);
  }

  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    min-height: calc(100vh - 100px);
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    display: flex;
    flex-direction: column;
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .panel-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-secondary);
  }

  textarea {
    flex: 1;
    width: 100%;
    min-height: 400px;
    font-family: "SF Mono", "Fira Code", "JetBrains Mono", monospace;
    font-size: 12px;
    line-height: 1.5;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--text);
    resize: vertical;
    tab-size: 2;
  }

  textarea:focus {
    outline: 2px solid var(--accent);
    outline-offset: -1px;
  }

  .btn-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }

  button {
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 500;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: var(--accent-hover); }

  .btn-secondary {
    background: var(--border);
    color: var(--text);
  }
  .btn-secondary:hover { opacity: 0.8; }

  #output {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 400px;
    overflow: auto;
  }

  #output svg {
    max-width: 100%;
    height: auto;
  }

  #output iframe {
    width: 100%;
    height: 100%;
    min-height: 500px;
    border: none;
    border-radius: 4px;
  }

  .status {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 8px;
  }

  .status.error { color: #d85a30; }

  .sample-btn {
    font-size: 11px;
    padding: 4px 8px;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    border-radius: 4px;
    cursor: pointer;
  }
  .sample-btn:hover { background: var(--border); }

  .file-upload {
    display: none;
  }
</style>
<!-- D3.js from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<!-- Our bundled renderer -->
<script src="dist/geometry-renderer.js"></script>
</head>
<body>

<h1>Geometry Renderer Viewer</h1>

<div class="layout">
  <!-- Input panel -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">Blueprint JSON</span>
      <div style="display: flex; gap: 6px;">
        <button class="sample-btn" onclick="loadSample2D()">Sample 2D</button>
        <button class="sample-btn" onclick="loadSample3D()">Sample 3D</button>
        <button class="sample-btn" onclick="loadSampleCoord()">Sample Coord</button>
        <label class="sample-btn" style="cursor: pointer;">
          Upload
          <input type="file" class="file-upload" accept=".json" onchange="loadFile(event)">
        </label>
      </div>
    </div>
    <textarea id="input" spellcheck="false" placeholder="Paste blueprint JSON here..."></textarea>
    <div class="btn-row">
      <button class="btn-primary" onclick="render()">Render</button>
      <button class="btn-secondary" onclick="openInNewTab()">Open in New Tab</button>
      <button class="btn-secondary" onclick="copyHtml()">Copy HTML</button>
    </div>
    <div id="status" class="status"></div>
  </div>

  <!-- Output panel -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">Output</span>
      <span id="dimension-badge" style="font-size: 11px; padding: 2px 8px; border-radius: 4px; background: var(--border);"></span>
    </div>
    <div id="output">
      <span style="color: var(--text-secondary); font-size: 14px;">
        Paste a blueprint JSON and click Render
      </span>
    </div>
  </div>
</div>

<script>
let lastHtml = '';

function render() {
  const input = document.getElementById('input').value.trim();
  const status = document.getElementById('status');
  const output = document.getElementById('output');
  const badge = document.getElementById('dimension-badge');

  if (!input) {
    status.textContent = 'Please paste a blueprint JSON';
    status.className = 'status error';
    return;
  }

  try {
    const blueprint = JSON.parse(input);
    const dim = blueprint.dimension || 'unknown';
    badge.textContent = dim.toUpperCase() + (blueprint.axes ? ' (coord)' : '');

    const t0 = performance.now();

    if (dim === '3d') {
      // 3D: render in iframe
      lastHtml = GeometryRenderer.renderFromBlueprint(blueprint);
      output.innerHTML = '';
      const iframe = document.createElement('iframe');
      iframe.srcdoc = lastHtml;
      output.appendChild(iframe);
    } else {
      // 2D: render SVG directly
      const svg = GeometryRenderer.renderToSvg(blueprint);
      lastHtml = GeometryRenderer.renderFromBlueprint(blueprint);
      output.innerHTML = svg;
    }

    const elapsed = (performance.now() - t0).toFixed(1);
    status.textContent = `Rendered in ${elapsed}ms`;
    status.className = 'status';
  } catch (e) {
    status.textContent = `Error: ${e.message}`;
    status.className = 'status error';
    console.error(e);
  }
}

function openInNewTab() {
  if (!lastHtml) { render(); }
  if (!lastHtml) return;
  const blob = new Blob([lastHtml], { type: 'text/html' });
  window.open(URL.createObjectURL(blob), '_blank');
}

function copyHtml() {
  if (!lastHtml) { render(); }
  if (!lastHtml) return;
  navigator.clipboard.writeText(lastHtml).then(() => {
    document.getElementById('status').textContent = 'HTML copied to clipboard';
  });
}

function loadFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    document.getElementById('input').value = e.target.result;
    render();
  };
  reader.readAsText(file);
}

// ── Sample blueprints ──

function loadSample2D() {
  document.getElementById('input').value = JSON.stringify({
    "dimension": "2d",
    "axes": false,
    "scale": {"reference": "OA", "real": "radius", "units": 5.0},
    "points": {
      "O": [0.0, 0.0, 0.0],
      "A": [5.0, 0.0, 0.0],
      "T": [5.0, -5.0, 0.0],
      "B": [1.71, 4.698, 0.0],
      "C": [-4.698, -1.71, 0.0]
    },
    "lines": [
      {"id": "line_TA", "from": "T", "to": "A"},
      {"id": "line_AB", "from": "A", "to": "B"},
      {"id": "line_BC", "from": "B", "to": "C"},
      {"id": "line_CA", "from": "C", "to": "A"},
      {"id": "line_OA", "from": "O", "to": "A", "style": "dashed"},
      {"id": "line_OB", "from": "O", "to": "B", "style": "dashed"}
    ],
    "circles": [{"id": "circle_O", "center": "O", "radius": 5.0}],
    "angles": [
      {"id": "angle_TAB", "vertex": "A", "p1": "T", "p2": "B", "value": 35},
      {"id": "angle_ACB", "vertex": "C", "p1": "A", "p2": "B"}
    ],
    "given": {"angle_TAB": "35\u00b0"},
    "asked": ["angle_ACB"]
  }, null, 2);
  render();
}

function loadSample3D() {
  document.getElementById('input').value = JSON.stringify({
    "dimension": "3d",
    "scale": {"reference": "AB", "real": "6 cm", "units": 5.0},
    "points": {
      "A": [0.0, 0.0, 0.0],
      "B": [5.0, 0.0, 0.0],
      "C": [2.5, 4.33, 0.0],
      "V": [2.5, 1.443, 4.082],
      "M": [3.75, 2.165, 0.0]
    },
    "lines": [
      {"id": "line_AB", "from": "A", "to": "B"},
      {"id": "line_BC", "from": "B", "to": "C"},
      {"id": "line_CA", "from": "C", "to": "A"},
      {"id": "line_VA", "from": "V", "to": "A"},
      {"id": "line_VB", "from": "V", "to": "B"},
      {"id": "line_VC", "from": "V", "to": "C"},
      {"id": "line_VM", "from": "V", "to": "M", "style": "dashed"},
      {"id": "line_AM", "from": "A", "to": "M", "style": "dashed"}
    ],
    "faces": [
      {"id": "face_ABC", "points": ["A", "B", "C"]},
      {"id": "face_VAB", "points": ["V", "A", "B"]},
      {"id": "face_VBC", "points": ["V", "B", "C"]},
      {"id": "face_VCA", "points": ["V", "C", "A"]}
    ],
    "angles": [
      {"id": "angle_VMA", "vertex": "M", "p1": "V", "p2": "A", "value": 70.529}
    ],
    "given": {"line_AB": "6 cm"},
    "asked": ["angle_VMA"]
  }, null, 2);
  render();
}

function loadSampleCoord() {
  document.getElementById('input').value = JSON.stringify({
    "dimension": "2d",
    "axes": true,
    "grid": true,
    "coordinate_range": {"x_min": -1.0, "x_max": 7.0, "y_min": -2.0, "y_max": 6.0},
    "scale": {"reference": "auto", "real": "1 unit", "units": 1.0},
    "points": {
      "A": [2.0, 3.0, 0.0],
      "B": [6.0, -1.0, 0.0],
      "Ix": [5.0, 0.0, 0.0],
      "Iy": [0.0, 5.0, 0.0]
    },
    "lines": [{"id": "line_AB", "from": "Iy", "to": "B"}],
    "given": {"A": [2.0, 3.0, 0.0], "B": [6.0, -1.0, 0.0]},
    "asked": ["line_equation", "Ix", "Iy"]
  }, null, 2);
  render();
}

// Auto-render on keyboard shortcut
document.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
    e.preventDefault();
    render();
  }
});
</script>
</body>
</html>
