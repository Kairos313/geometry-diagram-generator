<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geometry Diagram</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#ffffff;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
svg{display:block;max-width:100%;max-height:90vh}
#legend{position:absolute;top:20px;left:20px;color:rgba(0,0,0,.8);font-size:13px;line-height:2.1}
.dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;vertical-align:middle}
.line-sw{display:inline-block;width:16px;height:2px;margin-right:6px;vertical-align:middle;border-radius:1px}
#info{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);color:rgba(0,0,0,.45);font-size:13px;text-align:center;pointer-events:none}
</style>
</head>
<body>
<div id="legend">
  <div><span class="dot" style="background:#5b4dc7"></span>Circle C: (x−2)²+(y−3)²=25</div>
  <div><span class="line-sw" style="background:#0f6e56"></span>Line L: y = x + 4</div>
  <div><span class="dot" style="background:#d85a30"></span>Intersection points P1, P2</div>
</div>
<div id="info">L is a secant — it intersects the circle at two points</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
const W = 720, H = 540, margin = 60;
const xMin = -9, xMax = 9, yMin = -4, yMax = 10;
const xSpan = xMax - xMin, ySpan = yMax - yMin;
const pxPerUnit = Math.min((W - 2*margin) / xSpan, (H - 2*margin) / ySpan);
const cx = W/2, cy = H/2;
const midX = (xMin + xMax)/2, midY = (yMin + yMax)/2;
function sx(x) { return cx + (x - midX) * pxPerUnit; }
function sy(y) { return cy - (y - midY) * pxPerUnit; }
function sr(r) { return r * pxPerUnit; }

const svg = d3.select("body").append("svg")
  .attr("width", W).attr("height", H)
  .attr("viewBox", "0 0 " + W + " " + H);

// Grid lines
const xStep = 1, yStep = 1;
for (let x = Math.ceil(xMin); x <= Math.floor(xMax); x++) {
  svg.append("line")
    .attr("x1", sx(x)).attr("y1", sy(yMin))
    .attr("x2", sx(x)).attr("y2", sy(yMax))
    .attr("stroke", "#e0dfdb").attr("stroke-width", 0.5);
}
for (let y = Math.ceil(yMin); y <= Math.floor(yMax); y++) {
  svg.append("line")
    .attr("x1", sx(xMin)).attr("y1", sy(y))
    .attr("x2", sx(xMax)).attr("y2", sy(y))
    .attr("stroke", "#e0dfdb").attr("stroke-width", 0.5);
}

// Axes arrows
const defs = svg.append("defs");
defs.append("marker")
  .attr("id","arrowhead").attr("markerWidth",8).attr("markerHeight",6)
  .attr("refX",8).attr("refY",3).attr("orient","auto")
  .append("polygon").attr("points","0 0, 8 3, 0 6").attr("fill","#999");

// X axis
svg.append("line")
  .attr("x1", sx(xMin)).attr("y1", sy(0))
  .attr("x2", sx(xMax)).attr("y2", sy(0))
  .attr("stroke","#999").attr("stroke-width",1.2)
  .attr("marker-end","url(#arrowhead)");
// Y axis
svg.append("line")
  .attr("x1", sx(0)).attr("y1", sy(yMin))
  .attr("x2", sx(0)).attr("y2", sy(yMax))
  .attr("stroke","#999").attr("stroke-width",1.2)
  .attr("marker-end","url(#arrowhead)");

// Axis labels
svg.append("text").attr("x", sx(xMax)+8).attr("y", sy(0)+4)
  .attr("font-size",14).attr("fill","#666").text("x");
svg.append("text").attr("x", sx(0)+6).attr("y", sy(yMax)-6)
  .attr("font-size",14).attr("fill","#666").text("y");

// Tick marks and labels
for (let x = Math.ceil(xMin); x <= Math.floor(xMax); x++) {
  if (x === 0) continue;
  svg.append("line")
    .attr("x1", sx(x)).attr("y1", sy(0)-4)
    .attr("x2", sx(x)).attr("y2", sy(0)+4)
    .attr("stroke","#999").attr("stroke-width",1);
  if (x % 2 === 0) {
    svg.append("text").attr("x", sx(x)).attr("y", sy(0)+16)
      .attr("text-anchor","middle").attr("font-size",11).attr("fill","#888").text(x);
  }
}
for (let y = Math.ceil(yMin); y <= Math.floor(yMax); y++) {
  if (y === 0) continue;
  svg.append("line")
    .attr("x1", sx(0)-4).attr("y1", sy(y))
    .attr("x2", sx(0)+4).attr("y2", sy(y))
    .attr("stroke","#999").attr("stroke-width",1);
  if (y % 2 === 0) {
    svg.append("text").attr("x", sx(0)-10).attr("y", sy(y)+4)
      .attr("text-anchor","end").attr("font-size",11).attr("fill","#888").text(y);
  }
}
// Origin label
svg.append("text").attr("x", sx(0)-12).attr("y", sy(0)+14)
  .attr("font-size",12).attr("fill","#888").text("O");

// Circle
svg.append("circle")
  .attr("cx", sx(2)).attr("cy", sy(3))
  .attr("r", sr(5))
  .attr("fill","#5b4dc7").attr("fill-opacity",0.06)
  .attr("stroke","#5b4dc7").attr("stroke-width",1.8);

// Line L: y = x + 4, draw across visible range
const lineData = [];
for (let x = xMin; x <= xMax; x += 0.1) {
  const y = x + 4;
  if (y >= yMin && y <= yMax) lineData.push([x, y]);
}
// Extend to boundaries
const xAtYmin = yMin - 4; // x = y - 4
const xAtYmax = yMax - 4;
const yAtXmin = xMin + 4;
const yAtXmax = xMax + 4;

// Clip line to view
const linePoints = [];
// Find entry/exit points
const candidates = [];
if (yAtXmin >= yMin && yAtXmin <= yMax) candidates.push([xMin, yAtXmin]);
if (yAtXmax >= yMin && yAtXmax <= yMax) candidates.push([xMax, yAtXmax]);
if (xAtYmin >= xMin && xAtYmin <= xMax) candidates.push([xAtYmin, yMin]);
if (xAtYmax >= xMin && xAtYmax <= xMax) candidates.push([xAtYmax, yMax]);

// Remove duplicates and sort by x
const uniqueCands = [];
for (const c of candidates) {
  if (!uniqueCands.some(u => Math.abs(u[0]-c[0])<0.001 && Math.abs(u[1]-c[1])<0.001)) {
    uniqueCands.push(c);
  }
}
uniqueCands.sort((a,b) => a[0]-b[0]);

if (uniqueCands.length >= 2) {
  const lp1 = uniqueCands[0], lp2 = uniqueCands[uniqueCands.length-1];
  svg.append("line")
    .attr("x1", sx(lp1[0])).attr("y1", sy(lp1[1]))
    .attr("x2", sx(lp2[0])).attr("y2", sy(lp2[1]))
    .attr("stroke","#0f6e56").attr("stroke-width",2.0);
}

// Center point
svg.append("circle")
  .attr("cx", sx(2)).attr("cy", sy(3))
  .attr("r", 4)
  .attr("fill","#5b4dc7");
svg.append("text")
  .attr("x", sx(2)+10).attr("y", sy(3)-8)
  .attr("font-size",13).attr("fill","#5b4dc7").attr("font-weight","500")
  .text("C(2, 3)");

// Intersection points
const P1 = {x: 3.701, y: 7.701};
const P2 = {x: -2.701, y: 1.299};

// P1
svg.append("circle")
  .attr("cx", sx(P1.x)).attr("cy", sy(P1.y))
  .attr("r", 5)
  .attr("fill","#d85a30");
svg.append("text")
  .attr("x", sx(P1.x)+12).attr("y", sy(P1.y)-8)
  .attr("font-size",13).attr("fill","#d85a30").attr("font-weight","600")
  .text("P₁(≈3.70, ≈7.70)");

// P2
svg.append("circle")
  .attr("cx", sx(P2.x)).attr("cy", sy(P2.y))
  .attr("r", 5)
  .attr("fill","#d85a30");
svg.append("text")
  .attr("x", sx(P2.x)-14).attr("y", sy(P2.y)+18)
  .attr("text-anchor","end").attr("font-size",13).attr("fill","#d85a30").attr("font-weight","600")
  .text("P₂(≈−2.70, ≈1.30)");

// Radius line from C to P1 (dashed construction)
svg.append("line")
  .attr("x1", sx(2)).attr("y1", sy(3))
  .attr("x2", sx(P1.x)).attr("y2", sy(P1.y))
  .attr("stroke","#888780").attr("stroke-dasharray","6 4").attr("stroke-width",1.2);

// Radius line from C to P2 (dashed construction)
svg.append("line")
  .attr("x1", sx(2)).attr("y1", sy(3))
  .attr("x2", sx(P2.x)).attr("y2", sy(P2.y))
  .attr("stroke","#888780").attr("stroke-dasharray","6 4").attr("stroke-width",1.2);

// Circle equation label
svg.append("text")
  .attr("x", sx(2)+sr(5)+6).attr("y", sy(3)+sr(5)*0.3)
  .attr("font-size",12).attr("fill","#5b4dc7").attr("font-style","italic")
  .text("(x−2)²+(y−3)²=25");

// Line label
svg.append("text")
  .attr("x", sx(xMax-1.5)).attr("y", sy(xMax-1.5+4)-10)
  .attr("font-size",12).attr("fill","#0f6e56").attr("font-style","italic")
  .text("y = x+4");

</script>
</body>
</html>
