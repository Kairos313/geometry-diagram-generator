services:
  - type: web
    name: geometry-diagram-api
    runtime: python
    buildCommand: pip install -r website/requirements.txt
    startCommand: cd website && gunicorn api_server:app --bind 0.0.0.0:$PORT --timeout 300
    envVars:
      - key: OPENROUTER_WEBSITE_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11"
