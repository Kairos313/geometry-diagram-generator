<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geometry Diagram</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#ffffff;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
svg{display:block;max-width:100%;max-height:90vh}
#legend{position:absolute;top:20px;left:20px;color:rgba(0,0,0,.8);font-size:13px;line-height:2.1}
.dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;vertical-align:middle}
.line-sw{display:inline-block;width:16px;height:2px;margin-right:6px;vertical-align:middle;border-radius:1px}
#info{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);color:rgba(0,0,0,.45);font-size:13px;text-align:center;pointer-events:none}
</style>
</head>
<body>
<div id="legend">
  <div><span class="line-sw" style="background:#5b4dc7"></span>Parallelogram ABCD</div>
  <div><span class="line-sw" style="background:#d85a30;border-top:2px dashed #d85a30;background:none;border-bottom:none;border-left:none;border-right:none;width:20px;display:inline-block;margin-right:6px;vertical-align:middle"></span>Diagonal AC (asked)</div>
</div>
<div id="info">Parallelogram ABCD — Find diagonal AC using the cosine rule</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>

function drawAngleArc(svg, vx, vy, p1x, p1y, p2x, p2y, radius, color, expectedDeg, isRightAngle) {
  const dx1 = p1x - vx, dy1 = -(p1y - vy);
  const dx2 = p2x - vx, dy2 = -(p2y - vy);
  const len1 = Math.sqrt(dx1*dx1 + dy1*dy1);
  const len2 = Math.sqrt(dx2*dx2 + dy2*dy2);
  if (len1 < 1e-9 || len2 < 1e-9) return null;

  const u1x = dx1/len1, u1y = dy1/len1;
  const u2x = dx2/len2, u2y = dy2/len2;

  if (isRightAngle) {
    const s = radius * 0.7;
    const ax = vx + u1x * s, ay = vy - u1y * s;
    const cx2 = vx + u2x * s, cy2 = vy - u2y * s;
    const bx = ax + u2x * s, by = ay - u2y * s;
    svg.append("path")
      .attr("d", "M"+ax+","+ay+"L"+bx+","+by+"L"+cx2+","+cy2)
      .attr("fill", "none").attr("stroke", color).attr("stroke-width", 1.4);
    return { labelPos: {x: bx, y: by} };
  }

  const cross = u1x * u2y - u1y * u2x;
  const dot = Math.max(-1, Math.min(1, u1x*u2x + u1y*u2y));
  let sweepAngle = Math.acos(dot);
  let startU = {x: u1x, y: u1y};
  let perpX, perpY;
  if (cross >= 0) {
    perpX = -u1y; perpY = u1x;
  } else {
    perpX = u1y; perpY = -u1x;
  }

  if (expectedDeg != null) {
    const computedDeg = sweepAngle * 180 / Math.PI;
    if (Math.abs(computedDeg - expectedDeg) > 25) {
      const candidates = [
        {u1: {x:u1x,y:u1y}, u2: {x:u2x,y:u2y}},
        {u1: {x:-u1x,y:-u1y}, u2: {x:u2x,y:u2y}},
        {u1: {x:u1x,y:u1y}, u2: {x:-u2x,y:-u2y}},
        {u1: {x:-u1x,y:-u1y}, u2: {x:-u2x,y:-u2y}},
      ];
      let bestDiff = 999, bestC = null;
      for (const c of candidates) {
        const d = Math.max(-1, Math.min(1, c.u1.x*c.u2.x + c.u1.y*c.u2.y));
        const a = Math.acos(d) * 180 / Math.PI;
        const diff = Math.abs(a - expectedDeg);
        if (diff < bestDiff) {
          bestDiff = diff;
          bestC = c;
          sweepAngle = a * Math.PI / 180;
        }
      }
      if (bestC) {
        startU = bestC.u1;
        const cr = bestC.u1.x * bestC.u2.y - bestC.u1.y * bestC.u2.x;
        if (cr >= 0) {
          perpX = -bestC.u1.y; perpY = bestC.u1.x;
        } else {
          perpX = bestC.u1.y; perpY = -bestC.u1.x;
        }
      }
    }
  }

  const pts = [];
  const N = 40;
  for (let i = 0; i <= N; i++) {
    const t = (i / N) * sweepAngle;
    const px = vx + radius * (Math.cos(t) * startU.x + Math.sin(t) * perpX);
    const py = vy - radius * (Math.cos(t) * startU.y + Math.sin(t) * perpY);
    pts.push([px, py]);
  }

  let d = "M" + pts[0][0] + "," + pts[0][1];
  for (let i = 1; i < pts.length; i++) d += "L" + pts[i][0] + "," + pts[i][1];
  svg.append("path").attr("d", d)
    .attr("fill", "none").attr("stroke", color).attr("stroke-width", 1.4);

  const midIdx = Math.floor(N / 2);
  const labelR = radius * 1.6;
  const tMid = (midIdx / N) * sweepAngle;
  const lx = vx + labelR * (Math.cos(tMid) * startU.x + Math.sin(tMid) * perpX);
  const ly = vy - labelR * (Math.cos(tMid) * startU.y + Math.sin(tMid) * perpY);

  return { labelPos: {x: lx, y: ly} };
}

// Canvas setup
const W = 680, H = 500, margin = 80;

// Math coordinates
const mathPoints = {
  A: [0.0, 0.0],
  B: [5.0, 0.0],
  C: [3.521, 3.172],
  D: [-1.479, 3.172]
};

// Compute bounds
const xs = Object.values(mathPoints).map(p => p[0]);
const ys = Object.values(mathPoints).map(p => p[1]);
const xMin = Math.min(...xs), xMax = Math.max(...xs);
const yMin = Math.min(...ys), yMax = Math.max(...ys);

const xSpan = xMax - xMin, ySpan = yMax - yMin;
const pxPerUnit = Math.min((W - 2*margin) / xSpan, (H - 2*margin) / ySpan);
const cx = W/2, cy = H/2;
const midX = (xMin + xMax)/2, midY = (yMin + yMax)/2;

function sx(x) { return cx + (x - midX) * pxPerUnit; }
function sy(y) { return cy - (y - midY) * pxPerUnit; }
function sr(r) { return r * pxPerUnit; }

// SVG points
const A = {x: sx(0.0), y: sy(0.0)};
const B = {x: sx(5.0), y: sy(0.0)};
const C = {x: sx(3.521), y: sy(3.172)};
const D = {x: sx(-1.479), y: sy(3.172)};

const svg = d3.select("body").append("svg")
  .attr("width", W)
  .attr("height", H)
  .attr("viewBox", "0 0 " + W + " " + H);

// Centroid for label offsets
const centX = (A.x + B.x + C.x + D.x) / 4;
const centY = (A.y + B.y + C.y + D.y) / 4;

// 1. Filled polygon face
svg.append("polygon")
  .attr("points", [A,B,C,D].map(p => p.x+","+p.y).join(" "))
  .attr("fill", "#5b4dc7")
  .attr("opacity", 0.07);

// 2. Dashed diagonal AC
svg.append("line")
  .attr("x1", A.x).attr("y1", A.y)
  .attr("x2", C.x).attr("y2", C.y)
  .attr("stroke", "#d85a30")
  .attr("stroke-width", 2.2)
  .attr("stroke-dasharray", "8 5");

// 3. Solid edges
const edges = [[A,B],[B,C],[C,D],[D,A]];
edges.forEach(([p1,p2]) => {
  svg.append("line")
    .attr("x1", p1.x).attr("y1", p1.y)
    .attr("x2", p2.x).attr("y2", p2.y)
    .attr("stroke", "#5b4dc7")
    .attr("stroke-width", 2.0);
});

// 4. Angle arc at B (between BA and BC = 65°)
const arc = drawAngleArc(svg, B.x, B.y, A.x, A.y, C.x, C.y, 32, "#ba7517", 65, false);
if (arc) {
  svg.append("text")
    .attr("x", arc.labelPos.x)
    .attr("y", arc.labelPos.y)
    .attr("text-anchor", "middle")
    .attr("dominant-baseline", "middle")
    .attr("font-size", 13)
    .attr("fill", "#ba7517")
    .attr("font-weight", "500")
    .text("65°");
}

// 5. Points
const pts = {A, B, C, D};
Object.entries(pts).forEach(([name, p]) => {
  svg.append("circle")
    .attr("cx", p.x).attr("cy", p.y).attr("r", 4)
    .attr("fill", "#5b4dc7");
});

// 6. Point labels — offset away from centroid
const labelOffset = 20;
Object.entries(pts).forEach(([name, p]) => {
  const dx = p.x - centX;
  const dy = p.y - centY;
  const len = Math.sqrt(dx*dx + dy*dy);
  const ox = (dx/len) * labelOffset;
  const oy = (dy/len) * labelOffset;
  svg.append("text")
    .attr("x", p.x + ox)
    .attr("y", p.y + oy)
    .attr("text-anchor", "middle")
    .attr("dominant-baseline", "middle")
    .attr("font-size", 15)
    .attr("font-weight", "600")
    .attr("fill", "#333333")
    .text(name);
});

// 7. Edge labels
function edgeMidLabel(p1, p2, label, color, perpDir) {
  const mx = (p1.x + p2.x) / 2;
  const my = (p1.y + p2.y) / 2;
  const dx = p2.x - p1.x, dy = p2.y - p1.y;
  const len = Math.sqrt(dx*dx + dy*dy);
  // Perpendicular (rotated 90°)
  let px = -dy/len, py = dx/len;
  // Choose side away from centroid
  const toCentX = centX - mx, toCentY = centY - my;
  const dot = px*toCentX + py*toCentY;
  if (dot > 0) { px = -px; py = -py; }
  const offset = 18;
  svg.append("text")
    .attr("x", mx + px*offset)
    .attr("y", my + py*offset)
    .attr("text-anchor", "middle")
    .attr("dominant-baseline", "middle")
    .attr("font-size", 13)
    .attr("font-weight", "500")
    .attr("fill", color || "#333333")
    .text(label);
}

edgeMidLabel(A, B, "10 cm", "#333333");
edgeMidLabel(B, C, "7 cm", "#333333");

// Diagonal AC label — midpoint, offset
const acMx = (A.x + C.x) / 2;
const acMy = (A.y + C.y) / 2;
const acDx = C.x - A.x, acDy = C.y - A.y;
const acLen = Math.sqrt(acDx*acDx + acDy*acDy);
// Perpendicular
let acPx = -acDy/acLen, acPy = acDx/acLen;
// Push toward centroid side (inside the parallelogram)
const toCentX2 = centX - acMx, toCentY2 = centY - acMy;
const dotAC = acPx*toCentX2 + acPy*toCentY2;
if (dotAC < 0) { acPx = -acPx; acPy = -acPy; }
const acOffset = 22;
svg.append("text")
  .attr("x", acMx + acPx*acOffset)
  .attr("y", acMy + acPy*acOffset)
  .attr("text-anchor", "middle")
  .attr("dominant-baseline", "middle")
  .attr("font-size", 14)
  .attr("font-weight", "700")
  .attr("fill", "#d85a30")
  .text("?");

</script>
</body>
</html>
