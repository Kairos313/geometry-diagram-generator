<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geometry Diagram</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#ffffff;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif}
canvas{display:block}
#info{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(0,0,0,.5);font-size:13px;text-align:center;pointer-events:none;letter-spacing:.3px}
#legend{position:absolute;top:20px;left:20px;color:rgba(0,0,0,.75);font-size:13px;line-height:2}
.dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;vertical-align:middle}
.line-sw{display:inline-block;width:16px;height:3px;margin-right:6px;vertical-align:middle;border-radius:1px}
#controls{position:absolute;top:20px;right:20px;display:flex;gap:8px}
#controls button{background:rgba(0,0,0,.06);border:1px solid rgba(0,0,0,.15);color:#333;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;transition:background .2s}
#controls button:hover{background:rgba(0,0,0,.1)}
#controls button.active{background:rgba(100,140,255,.2);border-color:rgba(100,140,255,.5);color:#1a4eaa}
</style>
</head>
<body>
<div id="legend">
  <div><span class="dot" style="background:#5b4dc7"></span>Pyramid vertices &amp; edges</div>
  <div><span class="dot" style="background:#d85a30"></span>Slant height VM (asked)</div>
  <div><span class="dot" style="background:#888780"></span>Construction lines (dashed)</div>
  <div><span class="dot" style="background:#ba7517"></span>Right angle at O</div>
</div>
<div id="controls">
  <button id="btnRotate" onclick="toggleRotate()">Auto-rotate</button>
  <button onclick="resetCam()">Reset view</button>
</div>
<div id="info">Drag to orbit · Scroll to zoom</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0xffffff);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const dl = new THREE.DirectionalLight(0xffffff, 0.8);
dl.position.set(10, 20, 15);
scene.add(dl);

function addEdge(a, b, color, dashed) {
  const mat = dashed
    ? new THREE.LineDashedMaterial({color, dashSize:0.3, gapSize:0.15})
    : new THREE.LineBasicMaterial({color});
  const geo = new THREE.BufferGeometry().setFromPoints([a, b]);
  const line = new THREE.Line(geo, mat);
  if (dashed) line.computeLineDistances();
  scene.add(line);
  return line;
}

function addSphere(pos, color, r) {
  r = r || 0.18;
  const m = new THREE.Mesh(
    new THREE.SphereGeometry(r, 16, 16),
    new THREE.MeshPhongMaterial({color, emissive: color, emissiveIntensity: 0.35})
  );
  m.position.copy(pos);
  scene.add(m);
  return m;
}

function makeLabel(text, pos, color, size) {
  color = color || '#333333';
  size = size || 0.6;
  const c = document.createElement('canvas'); c.width = 256; c.height = 64;
  const ctx = c.getContext('2d');
  ctx.font = 'bold 36px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = color; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, 128, 32);
  const tex = new THREE.CanvasTexture(c);
  const mat = new THREE.SpriteMaterial({map: tex, transparent: true, depthTest: false});
  const sp = new THREE.Sprite(mat);
  sp.position.copy(pos);
  sp.scale.set(size * 4, size, 1);
  scene.add(sp);
  return sp;
}

function addFace(vertices, color, opacity) {
  opacity = opacity || 0.12;
  const positions = [];
  for (let i = 1; i < vertices.length - 1; i++) {
    positions.push(vertices[0].x, vertices[0].y, vertices[0].z);
    positions.push(vertices[i].x, vertices[i].y, vertices[i].z);
    positions.push(vertices[i+1].x, vertices[i+1].y, vertices[i+1].z);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(positions), 3));
  geo.computeVertexNormals();
  const mat = new THREE.MeshPhongMaterial({
    color, transparent: true, opacity, side: THREE.DoubleSide, depthWrite: false
  });
  scene.add(new THREE.Mesh(geo, mat));
}

function drawAngleArc3D(vertex, p1, p2, radius, color, isRightAngle) {
  const v1 = new THREE.Vector3().subVectors(p1, vertex);
  const v2 = new THREE.Vector3().subVectors(p2, vertex);
  if (v1.length() < 1e-9 || v2.length() < 1e-9) return null;
  v1.normalize(); v2.normalize();

  if (isRightAngle) {
    const s = radius * 0.7;
    const a = vertex.clone().add(v1.clone().multiplyScalar(s));
    const b = a.clone().add(v2.clone().multiplyScalar(s));
    const c = vertex.clone().add(v2.clone().multiplyScalar(s));
    const geo = new THREE.BufferGeometry().setFromPoints([a, b, c]);
    const line = new THREE.Line(geo, new THREE.LineBasicMaterial({color: color}));
    scene.add(line);
    return { labelPos: b };
  }

  const angle = Math.acos(Math.max(-1, Math.min(1, v1.dot(v2))));
  const axis = new THREE.Vector3().crossVectors(v1, v2).normalize();
  if (axis.length() < 1e-9) return null;

  const pts = [];
  const N = 30;
  for (let i = 0; i <= N; i++) {
    const t = (i / N) * angle;
    const q = new THREE.Quaternion().setFromAxisAngle(axis, t);
    const p = v1.clone().applyQuaternion(q).multiplyScalar(radius).add(vertex);
    pts.push(p);
  }

  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const line = new THREE.Line(geo, new THREE.LineBasicMaterial({color: color}));
  scene.add(line);

  const midT = angle / 2;
  const qMid = new THREE.Quaternion().setFromAxisAngle(axis, midT);
  const labelPos = v1.clone().applyQuaternion(qMid).multiplyScalar(radius * 1.6).add(vertex);
  return { labelPos: labelPos };
}

// === GEOMETRY ===
// Scale: notes use half-size coords (4 = half of 8cm side), height 3 = half of 6cm
// We'll scale up by 1.5 for better visibility: side=8 units, height=6 units

// Coordinates from notes, mapped to 3D (Y is up)
// Base is in XZ plane (y=0), apex is at y=6
const A = new THREE.Vector3( 4,  0,  4);
const B = new THREE.Vector3( 4,  0, -4);
const C = new THREE.Vector3(-4,  0, -4);
const D = new THREE.Vector3(-4,  0,  4);
const O = new THREE.Vector3( 0,  0,  0);
const V = new THREE.Vector3( 0,  6,  0);
// M = midpoint of AB
const M = new THREE.Vector3( 4,  0,  0);

// === FACES ===
addFace([A, B, C, D], 0x7b68ee, 0.13);
addFace([V, A, B], 0x4ae0b0, 0.13);
addFace([V, B, C], 0x4ae0b0, 0.13);
addFace([V, C, D], 0x4ae0b0, 0.13);
addFace([V, D, A], 0x4ae0b0, 0.13);

// === BASE EDGES ===
// Solid: AB, BC
addEdge(A, B, 0x5b4dc7, false);
addEdge(B, C, 0x5b4dc7, false);
// Dashed: CD, DA (back edges)
addEdge(C, D, 0x888780, true);
addEdge(D, A, 0x888780, true);

// === LATERAL EDGES ===
addEdge(V, A, 0x5b4dc7, false);
addEdge(V, B, 0x5b4dc7, false);
addEdge(V, C, 0x5b4dc7, false);
addEdge(V, D, 0x5b4dc7, false);

// === CONSTRUCTION LINES ===
// VO (height, dashed)
addEdge(V, O, 0x888780, true);
// OM (dashed)
addEdge(O, M, 0x888780, true);
// VM (slant height, highlighted)
addEdge(V, M, 0xd85a30, false);

// === VERTICES ===
addSphere(A, 0x5b4dc7, 0.18);
addSphere(B, 0x5b4dc7, 0.18);
addSphere(C, 0x5b4dc7, 0.18);
addSphere(D, 0x5b4dc7, 0.18);
addSphere(O, 0x888780, 0.15);
addSphere(V, 0x5b4dc7, 0.22);
addSphere(M, 0xd85a30, 0.22);

// === VERTEX LABELS ===
makeLabel('A', A.clone().add(new THREE.Vector3( 0.6, -0.5,  0.6)), '#4a3aad', 0.55);
makeLabel('B', B.clone().add(new THREE.Vector3( 0.6, -0.5, -0.6)), '#4a3aad', 0.55);
makeLabel('C', C.clone().add(new THREE.Vector3(-0.6, -0.5, -0.6)), '#4a3aad', 0.55);
makeLabel('D', D.clone().add(new THREE.Vector3(-0.6, -0.5,  0.6)), '#4a3aad', 0.55);
makeLabel('V', V.clone().add(new THREE.Vector3( 0,    0.7,  0  )), '#4a3aad', 0.55);
makeLabel('O', O.clone().add(new THREE.Vector3(-0.6, -0.4,  0  )), '#666666', 0.50);
makeLabel('M', M.clone().add(new THREE.Vector3( 0.7, -0.4,  0  )), '#d85a30', 0.55);

// === EDGE LABELS ===
// AB midpoint
const midAB = new THREE.Vector3().addVectors(A, B).multiplyScalar(0.5);
makeLabel('8 cm', midAB.clone().add(new THREE.Vector3(0.8, -0.5, 0)), '#555', 0.45);

// BC midpoint
const midBC = new THREE.Vector3().addVectors(B, C).multiplyScalar(0.5);
makeLabel('8 cm', midBC.clone().add(new THREE.Vector3(0, -0.5, -0.8)), '#555', 0.45);

// VO label (height)
const midVO = new THREE.Vector3().addVectors(V, O).multiplyScalar(0.5);
makeLabel('6 cm', midVO.clone().add(new THREE.Vector3(-1.0, 0, 0)), '#555', 0.45);

// VM label (asked)
const midVM = new THREE.Vector3().addVectors(V, M).multiplyScalar(0.5);
makeLabel('?', midVM.clone().add(new THREE.Vector3(1.0, 0.3, 0)), '#d85a30', 0.60);

// === RIGHT ANGLE AT O ===
// Angle between OV (upward) and OM (toward M)
const arc = drawAngleArc3D(O, V, M, 1.0, 0xba7517, true);

// === CAMERA ===
camera.position.set(18, 14, 18);
camera.lookAt(0, 2, 0);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.target.set(0, 2, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.autoRotate = false;
controls.autoRotateSpeed = 2.0;
controls.minDistance = 8;
controls.maxDistance = 60;
controls.maxPolarAngle = Math.PI * 0.85;
controls.update();

const _initPos = camera.position.clone();
const _initTarget = controls.target.clone();

function toggleRotate() {
  controls.autoRotate = !controls.autoRotate;
  document.getElementById('btnRotate').classList.toggle('active', controls.autoRotate);
}
function resetCam() {
  camera.position.copy(_initPos);
  controls.target.copy(_initTarget);
  controls.autoRotate = false;
  document.getElementById('btnRotate').classList.remove('active');
  controls.update();
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', function() {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
